<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg:     #0a0a0a;
  --bg2:    #0f0f0f;
  --bg3:    #141414;
  --green:  #00e676;
  --green2: #69f0ae;
  --dim:    rgba(0,230,118,.5);
  --muted:  rgba(255,255,255,.38);
  --white:  #e8e8e8;
  --bord:   rgba(0,230,118,.13);
  --bord2:  rgba(255,255,255,.07);
  --f-mono: 'IBM Plex Mono', monospace;
  --f-sans: 'IBM Plex Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--f-mono);
  overflow-x: hidden;
  cursor: none;
}

/* ── CURSOR ─────────────────────────────── */
#cur {
  position: fixed; width: 14px; height: 14px;
  border: 1px solid var(--green);
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .12s, height .12s, background .12s;
  mix-blend-mode: exclusion;
}
#cur-dot {
  position: fixed; width: 3px; height: 3px;
  background: var(--green); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
}
.cur-lg { width: 36px !important; height: 36px !important; background: rgba(0,230,118,.06) !important; }
@media (max-width: 900px) { #cur, #cur-dot { display: none; } body { cursor: auto; } }

/* ── MATRIX RAIN ────────────────────────── */
#mcanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .16; }

/* ── GRAIN ──────────────────────────────── */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 1;
  pointer-events: none; opacity: .035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  animation: grain .4s steps(2) infinite;
}
@keyframes grain {
  0%  { background-position: 0 0; }
  25% { background-position: -8px 12px; }
  50% { background-position: 12px -8px; }
  75% { background-position: -12px -12px; }
}

/* ── NAV ────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 54px; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,.93);
  border-bottom: 1px solid var(--bord2);
  backdrop-filter: blur(8px);
}
.nav-logo {
  font-family: var(--f-mono); font-size: 13px; font-weight: 700;
  letter-spacing: 6px; color: var(--green);
  text-decoration: none; display: flex; align-items: center; gap: 8px;
}
.nav-logo-caret { color: var(--muted); font-weight: 300; animation: blink .9s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.nav-right { display: flex; align-items: center; gap: 28px; }
.nav-links { display: flex; gap: 26px; list-style: none; }
.nav-links a {
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  text-decoration: none; text-transform: uppercase; transition: color .2s;
  position: relative;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
  height: 1px; background: var(--green);
  transform: scaleX(0); transform-origin: left; transition: transform .3s;
}
.nav-links a:hover { color: var(--green); }
.nav-links a:hover::after { transform: scaleX(1); }

/* Lang switcher */
.lang-sw {
  display: flex; border: 1px solid var(--bord);
  overflow: hidden;
}
.lang-sw button {
  padding: 5px 12px; background: none; border: none; cursor: pointer;
  font-family: var(--f-mono); font-size: 10px; letter-spacing: 2px; color: var(--muted);
  transition: all .2s;
}
.lang-sw button.on { color: var(--green); background: rgba(0,230,118,.08); }

.nav-burger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer;
}
.nav-burger span { width: 22px; height: 1px; background: var(--green); display: block; }

/* ── SECTION COMMONS ────────────────────── */
section { position: relative; z-index: 2; }
.s-tag {
  font-size: 10px; letter-spacing: 4px; color: var(--dim);
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.s-tag::before { content: '//'; }
.s-title {
  font-family: var(--f-mono); font-size: clamp(26px, 4vw, 46px);
  font-weight: 700; letter-spacing: 1px; color: var(--white); margin-bottom: 52px;
  position: relative; display: inline-block;
}
.s-title::after { content: '_'; color: var(--green); animation: blink .8s step-end infinite; }

/* ── HERO ───────────────────────────────── */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 54px 48px 80px; overflow: hidden;
}
.hero-tl {
  position: absolute; left: 48px; top: 70px;
  font-size: 9px; color: var(--dim); letter-spacing: 3px;
  display: flex; flex-direction: column; gap: 5px;
}
.hero-tl-row { display: flex; align-items: center; gap: 8px; }
.hero-tl-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0;
  animation: dotpulse 2s ease-in-out infinite;
}
@keyframes dotpulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,.4)} 50%{opacity:.5;box-shadow:0 0 0 5px rgba(0,230,118,0)} }
.hero-aside {
  position: absolute; right: 48px; top: 50%; transform: translateY(-50%) rotate(90deg);
  font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,.12); white-space: nowrap;
}
.hero-hline {
  position: absolute; left: 0; right: 0; height: 1px; background: var(--bord2);
}
.hero-hline-t { top: 54px; }
.hero-hline-b { bottom: 80px; }

.hero-content { position: relative; z-index: 3; padding-top: 36px; max-width: 95vw; }

.hero-badge {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; letter-spacing: 3px; color: var(--dim);
  margin-bottom: 28px;
  animation: fadeup .6s ease both .1s;
}
.hero-badge-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: dotpulse 2s ease-in-out infinite; }

.hero-name {
  font-family: var(--f-mono);
  font-size: clamp(60px, 12.5vw, 148px);
  font-weight: 700; line-height: .88; letter-spacing: -2px;
  color: var(--white); position: relative;
  animation: fadeup .8s ease both .3s;
}
.hero-name::before {
  content: attr(data-text); position: absolute; inset: 0;
  color: var(--green); opacity: 0;
  clip-path: polygon(0 28%, 100% 28%, 100% 48%, 0 48%);
  animation: ga 11s infinite;
}
.hero-name::after {
  content: attr(data-text); position: absolute; inset: 0;
  color: #ff3a5c; opacity: 0;
  clip-path: polygon(0 58%, 100% 58%, 100% 74%, 0 74%);
  animation: gb 11s infinite .6s;
}
@keyframes ga { 0%,90%,100%{opacity:0;transform:none} 91%,93%{opacity:.85;transform:translateX(-4px) skewX(-2deg)} 92%{opacity:0} }
@keyframes gb { 0%,93%,100%{opacity:0;transform:none} 94%,96%{opacity:.75;transform:translateX(4px) skewX(2deg)} 95%{opacity:0} }

.hero-rule {
  width: 56px; height: 2px; background: var(--green);
  margin: 22px 0; animation: fadeup .5s ease both .7s, ruleGrow .5s ease both .7s;
}
@keyframes ruleGrow { from{width:0} to{width:56px} }

.hero-sub {
  font-family: var(--f-sans); font-size: clamp(13px, 1.5vw, 16px);
  font-weight: 300; line-height: 1.8; color: var(--muted);
  white-space: pre-line; max-width: 500px; margin-bottom: 44px;
  animation: fadeup .6s ease both .9s;
}
.hero-cta { display: flex; gap: 12px; flex-wrap: wrap; animation: fadeup .6s ease both 1.1s; }
.hero-scroll {
  display: flex; align-items: center; gap: 10px;
  margin-top: 48px; animation: fadeup .6s ease both 1.4s;
}
.hero-scroll span { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,.2); }
.sbar {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, var(--green), transparent);
  animation: sbarAnim 2s ease-in-out infinite;
}
@keyframes sbarAnim { 0%,100%{width:40px;opacity:.4} 50%{width:60px;opacity:1} }

/* ── BUTTONS ────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 26px; font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  text-decoration: none; cursor: pointer; border: none;
  position: relative; overflow: hidden; transition: all .25s;
}
.btn-primary { background: var(--green); color: #000; font-weight: 700; }
.btn-primary:hover { background: var(--green2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,230,118,.28); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--bord2); }
.btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,.22); transform: translateY(-2px); }

/* ── ABOUT ──────────────────────────────── */
#about { padding: 120px 48px; max-width: 1200px; width: 100%; margin: 0 auto; }
.about-grid { display: grid; grid-template-columns: 360px 1fr; gap: 80px; align-items: start; }
.about-photo-wrap { position: relative; }
.about-photo-bar { position: absolute; left: -18px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--green), transparent 80%); }
.about-photo-frame {
  aspect-ratio: 3/4; width: 100%; overflow: hidden;
  border: 1px solid var(--bord2); background: var(--bg2);
  position: relative; filter: grayscale(15%);
}
.about-photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
.about-photo-frame::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.1) 0px, rgba(0,0,0,.1) 1px, transparent 1px, transparent 3px);
}
.about-ph { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--dim); font-size: 10px; letter-spacing: 2px; }
.about-accent-br { position: absolute; bottom: -10px; right: -10px; width: 44px; height: 44px; border-right: 2px solid var(--green); border-bottom: 2px solid var(--green); }
.about-accent-tl { position: absolute; top: -10px; left: -10px; width: 44px; height: 44px; border-left: 1px solid var(--bord); border-top: 1px solid var(--bord); }

.about-desc { font-family: var(--f-sans); font-size: 15px; line-height: 1.9; color: var(--muted); margin-bottom: 32px; font-weight: 300; }
.about-facts { display: flex; flex-direction: column; gap: 1px; }
.about-fact {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 13px 14px; border-left: 2px solid transparent;
  transition: all .25s; cursor: default;
}
.about-fact:hover { border-left-color: var(--green); background: rgba(0,230,118,.03); }
.af-icon { font-size: 14px; flex-shrink: 0; opacity: .65; margin-top: 2px; }
.af-text { font-size: 12px; color: var(--muted); line-height: 1.65; }

/* ── PHOTOS ─────────────────────────────── */
#photos { padding: 120px 48px; background: var(--bg2); }
.photos-inner { max-width: 1200px; margin: 0 auto; }
.gallery-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--bord2); border: 1px solid var(--bord2);
}
.gallery-item { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; background: var(--bg); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(25%); transition: transform .5s, filter .4s; }
.gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
.gallery-ph { width: 100%; height: 100%; background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--dim); font-size: 9px; letter-spacing: 3px; }
.gallery-num { font-family: var(--f-mono); font-size: 26px; font-weight: 700; opacity: .1; }
.gallery-ov {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 45%, rgba(10,10,10,.93) 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 14px; opacity: 0; transition: opacity .3s;
}
.gallery-item:hover .gallery-ov { opacity: 1; }
.g-tag { font-size: 9px; letter-spacing: 3px; color: var(--green); margin-bottom: 4px; }
.g-title { font-size: 12px; letter-spacing: .5px; color: var(--white); }

/* Lightbox */
#lb { position: fixed; inset: 0; z-index: 1000; background: rgba(10,10,10,.97); display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
#lb.open { display: flex; }
#lb img { max-width: 88vw; max-height: 85vh; object-fit: contain; border: 1px solid var(--bord2); }
#lb-close { position: absolute; top: 26px; right: 34px; font-size: 16px; color: var(--muted); cursor: pointer; background: none; border: none; font-family: var(--f-mono); transition: color .2s; }
#lb-close:hover { color: var(--green); }
#lb-info { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); text-align: center; }
.lbt { font-size: 9px; letter-spacing: 3px; color: var(--green); margin-bottom: 4px; }
.lbti { font-size: 12px; color: var(--white); letter-spacing: .5px; }
#lb-nav { position: absolute; bottom: 32px; right: 36px; display: flex; gap: 6px; }
.lba { width: 34px; height: 34px; border: 1px solid var(--bord2); background: none; color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: var(--f-mono); transition: all .2s; }
.lba:hover { border-color: var(--green); color: var(--green); }

/* ── VIDEOS ─────────────────────────────── */
#videos { padding: 120px 48px; max-width: 1200px; margin: 0 auto; }
.video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--bord2); border: 1px solid var(--bord2); }
.video-card { background: var(--bg); cursor: pointer; transition: background .25s; position: relative; overflow: hidden; }

.vthumb { aspect-ratio: 16/9; background: var(--bg3); position: relative; overflow: hidden; }
.vthumb img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(35%); transition: filter .4s; }

.vthumb-ph { width: 100%; height: 100%; background: var(--bg3); display: flex; align-items: center; justify-content: center; }
.vplay-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(10,10,10,.3); transition: background .3s; }
.video-card:hover .vplay-wrap { background: rgba(10,10,10,.08); }
.vplay {

  display: flex; align-items: center; justify-content: center;

  transition: all .3s;
  animation: vplaypulse 2.5s ease-in-out infinite;

.vidx { font-size: 9px; letter-spacing: 3px; color: var(--dim); margin-bottom: 7px; }
.vtitle { font-size: 13px; letter-spacing: .5px; color: var(--white); margin-bottom: 4px; }
.vdesc { font-size: 11px; color: var(--muted); }
.vfoot { padding: 10px 18px; border-top: 1px solid var(--bord2); font-size: 9px; letter-spacing: 2px; color: var(--dim); display: flex; justify-content: space-between; transition: color .2s; }

#vm-close {
  position: fixed; top: 20px; right: 24px; z-index: 1002;
  font-size: 12px; letter-spacing: 2px;
  color: var(--muted); cursor: pointer;
  background: rgba(0,230,118,.06); border: 1px solid var(--bord);
  font-family: var(--f-mono); transition: all .2s;
  padding: 8px 16px; display: none; align-items: center; gap: 8px;
}
#vm.open #vm-close { display: flex; }
#vm-close:hover { color: var(--green); background: rgba(0,230,118,.12); border-color: var(--green); }

/* ── CONTACT ────────────────────────────── */
#contact { padding: 120px 48px 80px; max-width: 800px; margin: 0 auto; }
.contact-cta { font-family: var(--f-sans); font-size: clamp(13px, 1.6vw, 16px); color: var(--muted); line-height: 1.85; margin-bottom: 48px; font-weight: 300; }
.contact-cards { display: flex; gap: 1px; background: var(--bord2); border: 1px solid var(--bord2); margin-bottom: 36px; }
.cc { flex: 1; padding: 22px 24px; background: var(--bg); text-decoration: none; display: flex; align-items: flex-start; gap: 14px; transition: background .25s; }
.cc:hover { background: var(--bg2); }
.cc-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; color: var(--green); opacity: .8; }
.cc-label { font-size: 9px; letter-spacing: 3px; color: var(--dim); margin-bottom: 5px; }
.cc-val { font-size: 12px; color: var(--white); letter-spacing: .3px; }

/* ── FOOTER ─────────────────────────────── */
footer { padding: 22px 48px; border-top: 1px solid var(--bord2); display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 2; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,.18); }
.foot-logo { font-family: var(--f-mono); font-weight: 700; font-size: 12px; color: var(--dim); }

/* ── ANIMATIONS ─────────────────────────── */
@keyframes fadeup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.reveal { opacity: 0; transform: translateY(22px); transition: opacity .65s ease, transform .65s ease; }
.reveal.visible { opacity: 1; transform: none; }
.rs > * { opacity: 0; transform: translateY(14px); transition: opacity .5s ease, transform .5s ease; }
.rs.visible > *:nth-child(1){opacity:1;transform:none;transition-delay:0s}
.rs.visible > *:nth-child(2){opacity:1;transform:none;transition-delay:.08s}
.rs.visible > *:nth-child(3){opacity:1;transform:none;transition-delay:.16s}
.rs.visible > *:nth-child(4){opacity:1;transform:none;transition-delay:.24s}
.rs.visible > *:nth-child(5){opacity:1;transform:none;transition-delay:.32s}

/* ── MOBILE ─────────────────────────────── */
@media (max-width: 900px) {
  nav { padding: 0 18px; }
  .nav-links { display: none; flex-direction: column; position: absolute; top: 54px; left: 0; right: 0; padding: 18px; background: rgba(10,10,10,.99); gap: 16px; border-bottom: 1px solid var(--bord2); }
  .nav-links.open { display: flex; }
  .nav-burger { display: flex; }
  .nav-right { gap: 12px; }
  #hero { padding: 70px 20px 60px; }
  .hero-tl, .hero-aside { display: none; }
  #about { padding: 80px 20px; }
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .about-photo-bar { display: none; }
  #photos { padding: 80px 20px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  #videos { padding: 80px 20px; }
  .video-grid { grid-template-columns: 1fr; }
  #contact { padding: 80px 20px; }
  .contact-cards { flex-direction: column; }
  footer { flex-direction: column; gap: 10px; text-align: center; padding: 18px; }
}
@media (max-width: 540px) {
  .gallery-grid { grid-template-columns: 1fr; }
  .hero-cta { flex-direction: column; }
}
</style>
</head>
<body>

<canvas id="mcanvas"></canvas>
<div id="cur"></div>
<div id="cur-dot"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#hero"><span class="nav-logo-caret">></span><span id="nav-name">AUSTIN</span></a>
  <div class="nav-right">
    <ul class="nav-links" id="nav-links">
      <li><a href="#about"   data-ru="Обо мне"  data-en="About">Обо мне</a></li>
      <li><a href="#photos"  data-ru="Фото"     data-en="Work">Фото</a></li>
      <li><a href="#videos"  data-ru="Видео"    data-en="Video">Видео</a></li>
      <li><a href="#contact" data-ru="Контакт"  data-en="Contact">Контакт</a></li>
    </ul>
    <div class="lang-sw">
      <button id="btn-ru" class="on">RU</button>
      <button id="btn-en">EN</button>
    </div>
    <button class="nav-burger" id="nav-burger"><span></span><span></span><span></span></button>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-hline hero-hline-t"></div>
  <div class="hero-hline hero-hline-b"></div>
  <div class="hero-tl">
    <div class="hero-tl-row"><div class="hero-tl-dot"></div><span>SYSTEM ONLINE</span></div>
    <div style="color:rgba(255,255,255,.15);margin-top:3px" id="hero-clock"></div>
  </div>
  <div class="hero-aside">AUSTIN — NEURAL CREATOR</div>
  <div class="hero-content">
    <div class="hero-badge"><div class="hero-badge-dot"></div><span id="h-label"></span></div>
    <div class="hero-name" id="h-name"></div>
    <div class="hero-rule"></div>
    <div class="hero-sub" id="h-sub"></div>
    <div class="hero-cta">
      <a class="btn btn-primary" href="#photos" id="btn-port">Портфолио</a>
      <a class="btn btn-ghost"   href="#contact" id="btn-cont">Связаться</a>
    </div>
    <div class="hero-scroll"><span id="h-scroll">SCROLL</span><div class="sbar"></div></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="about-grid">
    <div class="about-photo-wrap reveal">
      <div class="about-photo-bar"></div>
      <div class="about-photo-frame" id="about-photo"></div>
      <div class="about-accent-br"></div>
      <div class="about-accent-tl"></div>
    </div>
    <div class="reveal" style="padding-top:4px">
      <div class="s-tag" id="about-tag">// ОБО МНЕ</div>
      <div class="s-title" id="about-head">КТО Я</div>
      <p class="about-desc" id="about-desc"></p>
      <div class="about-facts" id="about-facts"></div>
    </div>
  </div>
</section>

<!-- PHOTOS -->
<section id="photos">
  <div class="photos-inner">
    <div class="s-tag reveal">// PORTFOLIO</div>
    <div class="s-title reveal" id="photos-title">РАБОТЫ</div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="lb">
  <button id="lb-close">[✕]</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-info"><div class="lbt" id="lb-tag"></div><div class="lbti" id="lb-title"></div></div>
  <div id="lb-nav"><button class="lba" id="lb-prev">←</button><button class="lba" id="lb-next">→</button></div>
</div>

<!-- VIDEOS -->
<section id="videos">
  <div class="s-tag reveal">// VIDEO</div>
  <div class="s-title reveal" id="videos-title">РОЛИКИ</div>
  <div class="video-grid" id="video-grid"></div>
</section>

<!-- Video modal -->
<div id="vm">
  <button id="vm-close">✕ <span id="vm-close-label">ЗАКРЫТЬ</span></button>
  <div id="vmi">
    <iframe id="v-ifr" src="" frameborder="0" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>
</div>

<!-- CONTACT -->
<section id="contact">
  <div class="s-tag reveal">// CONTACT</div>
  <div class="s-title reveal" id="cont-title">КОНТАКТЫ</div>
  <p class="contact-cta reveal" id="cont-cta"></p>
  <div class="contact-cards reveal" id="cont-cards"></div>
  <div class="reveal"><a class="btn btn-primary" id="tg-btn" href="#">→ Telegram</a></div>
</section>

<footer>
  <div class="foot-logo" id="foot-name"></div>
  <div id="foot-copy"></div>
</footer>

<script>
/* ── MATRIX RAIN ────────────────────────── */
(function(){
  var c = document.getElementById('mcanvas'), ctx = c.getContext('2d');
  var W, H, cols, drops;
  var ch = 'アイウエオカキクケコサシスセソ0123456789ABCDEF<>{}[]/\\|';
  function init(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    cols = Math.floor(W / 18);
    drops = [];
    for(var i=0;i<cols;i++) drops[i] = Math.random() * -(H/18);
  }
  function draw(){
    ctx.fillStyle = 'rgba(10,10,10,0.052)';
    ctx.fillRect(0,0,W,H);
    ctx.font = '13px IBM Plex Mono, monospace';
    for(var i=0;i<cols;i++){
      var y = drops[i]*18;
      ctx.fillStyle = '#9effc8';
      ctx.fillText(ch[Math.floor(Math.random()*ch.length)], i*18, y);
      ctx.fillStyle = 'rgba(0,230,118,0.52)';
      ctx.fillText(ch[Math.floor(Math.random()*ch.length)], i*18, y-18);
      if(y > H && Math.random() > .975) drops[i] = 0;
      drops[i] += 0.44;
    }
  }
  init();
  window.addEventListener('resize', init);
  setInterval(draw, 44);
})();

/* ── MAIN ───────────────────────────────── */
(function(){
  var S = SITE, lang = 'ru';

  /* Часы */
  function tick(){
    var t=new Date(), p=function(n){return String(n).padStart(2,'0');};
    var el=document.getElementById('hero-clock');
    if(el) el.textContent = p(t.getHours())+':'+p(t.getMinutes())+':'+p(t.getSeconds());
  }
  tick(); setInterval(tick,1000);

  /* ── RENDER ─────────────────────────────── */
  function render(){
    var ru = lang==='ru';

    /* hero */
    document.getElementById('h-label').textContent  = ru ? S.hero.label_ru  : S.hero.label_en;
    var ne = document.getElementById('h-name');
    ne.textContent = S.hero.name; ne.dataset.text = S.hero.name;
    document.getElementById('h-sub').textContent    = ru ? S.hero.subtitle_ru : S.hero.subtitle_en;
    document.getElementById('btn-port').textContent = ru ? 'Портфолио' : 'Portfolio';
    document.getElementById('btn-cont').textContent = ru ? 'Связаться'  : 'Get in touch';
    document.getElementById('nav-name').textContent = S.hero.name;
    document.getElementById('foot-name').textContent= S.hero.name;
    document.getElementById('foot-copy').textContent= '© '+new Date().getFullYear();

    /* about */
    document.getElementById('about-tag').textContent  = ru ? '// ОБО МНЕ' : '// ABOUT';
    document.getElementById('about-head').textContent = ru ? S.about.heading_ru : S.about.heading_en;
    document.getElementById('about-desc').textContent = ru ? S.about.text_ru : S.about.text_en;
    var pf = document.getElementById('about-photo');
    if(!pf.childElementCount){
      if(S.about.photo){ var im=document.createElement('img'); im.src=S.about.photo; im.alt=S.hero.name; pf.appendChild(im); }
      else { pf.innerHTML='<div class="about-ph"><span style="font-size:36px">👤</span>ADD PHOTO</div>'; }
    }
    var fe = document.getElementById('about-facts');
    fe.innerHTML='';
    S.about.facts.forEach(function(f){
      fe.innerHTML+='<div class="about-fact"><div class="af-icon">'+f.icon+'</div><div class="af-text">'+(ru?f.ru:f.en)+'</div></div>';
    });

    /* photos */
    document.getElementById('photos-title').textContent = ru?'РАБОТЫ':'WORKS';
    var gg = document.getElementById('gallery-grid');
    if(!gg.childElementCount){
      S.photos.forEach(function(p,i){
        var item=document.createElement('div'); item.className='gallery-item'; item.dataset.index=i;
        item.innerHTML=(p.url
          ?'<img src="'+p.url+'" alt="" loading="lazy">'
          :'<div class="gallery-ph"><div class="gallery-num">'+String(i+1).padStart(2,'0')+'</div></div>')+
          '<div class="gallery-ov"><div class="g-tag" data-ptag="'+i+'"></div><div class="g-title" data-pi="'+i+'"></div></div>';
        item.addEventListener('click',function(){openLB(i);});
        gg.appendChild(item);
        item.style.cssText='opacity:0;transform:scale(.95);transition:opacity .45s ease,transform .45s ease';
      });
      initGalleryObserver();
    }
    document.querySelectorAll('.g-tag[data-ptag]').forEach(function(el){
      var p=S.photos[parseInt(el.dataset.ptag)];
      el.textContent=ru?(p.tag_ru||p.tag):p.tag;
    });
    document.querySelectorAll('.g-title[data-pi]').forEach(function(el){
      var p=S.photos[parseInt(el.dataset.pi)];
      el.textContent=ru?p.title_ru:p.title_en;
    });

    /* videos */
    document.getElementById('videos-title').textContent = ru?'РОЛИКИ':'VIDEOS';
    var vg=document.getElementById('video-grid');
    if(!vg.childElementCount){
      S.videos.forEach(function(v,i){
        var card=document.createElement('div'); card.className='video-card';
        var isK=v.type==='kinescope';
        var hasThumb = v.thumb && v.thumb.length > 0;
        var th = hasThumb
          ? '<div class="vthumb"><img src="'+v.thumb+'" loading="lazy"><div class="vplay-wrap"><div class="vplay">▶</div></div></div>'
          : (isK
            ? '<div class="vthumb"><div class="vthumb-ph"><div class="vplay-wrap"><div class="vplay">▶</div></div></div></div>'
            : '<div class="vthumb"><img src="https://img.youtube.com/vi/'+v.id+'/maxresdefault.jpg" loading="lazy"><div class="vplay-wrap"><div class="vplay">▶</div></div></div>');
        card.innerHTML=th+
          '<div class="vmeta"><div class="vidx">// '+String(i+1).padStart(2,'0')+'</div>'+
          '<div class="vtitle" data-vi="'+i+'"></div>'+
          '<div class="vdesc" data-vd="'+i+'"></div></div>'+
          '<div class="vfoot"><span data-watch>СМОТРЕТЬ</span><span>→</span></div>';
        card.addEventListener('click',function(){openVid(v.id,isK);});
        vg.appendChild(card);
      });
    }
    document.querySelectorAll('.vtitle[data-vi]').forEach(function(el){
      var v=S.videos[parseInt(el.dataset.vi)]; el.textContent=ru?v.title_ru:v.title_en;
    });
    document.querySelectorAll('.vdesc[data-vd]').forEach(function(el){
      var v=S.videos[parseInt(el.dataset.vd)]; el.textContent=ru?v.desc_ru:v.desc_en;
    });
    document.querySelectorAll('[data-watch]').forEach(function(el){ el.textContent=ru?'СМОТРЕТЬ':'WATCH'; });
    var vcl=document.getElementById('vm-close-label'); if(vcl) vcl.textContent=ru?'ЗАКРЫТЬ':'CLOSE';

    /* contacts */
    document.getElementById('cont-title').textContent = ru?'КОНТАКТЫ':'CONTACT';
    document.getElementById('cont-cta').textContent   = ru?S.contacts.cta_ru:S.contacts.cta_en;
    var tgU='https://t.me/'+S.contacts.telegram;
    document.getElementById('tg-btn').href=tgU;
    document.getElementById('cont-cards').innerHTML=
      '<a class="cc" href="'+tgU+'" target="_blank"><div class="cc-icon">✈</div><div><div class="cc-label">TELEGRAM</div><div class="cc-val">@'+S.contacts.telegram+'</div></div></a>'+
      '<a class="cc" href="mailto:'+S.contacts.email+'"><div class="cc-icon">✉</div><div><div class="cc-label">EMAIL</div><div class="cc-val">'+S.contacts.email+'</div></div></a>';

    /* nav links */
    document.querySelectorAll('.nav-links a[data-ru]').forEach(function(a){
      a.textContent=ru?a.dataset.ru:a.dataset.en;
    });
  }

  /* lang buttons */
  document.getElementById('btn-ru').addEventListener('click',function(){ lang='ru'; this.classList.add('on'); document.getElementById('btn-en').classList.remove('on'); render(); });
  document.getElementById('btn-en').addEventListener('click',function(){ lang='en'; this.classList.add('on'); document.getElementById('btn-ru').classList.remove('on'); render(); });

  render();

  /* ── LIGHTBOX ───────────────────────────── */
  var lb=document.getElementById('lb'), lbImg=document.getElementById('lb-img'), lbIdx=0;
  function openLB(i){
    lbIdx=i; var p=S.photos[i];
    lbImg.src=p.url||'';
    document.getElementById('lb-tag').textContent  = lang==='ru'?(p.tag_ru||p.tag):p.tag;
    document.getElementById('lb-title').textContent=lang==='ru'?p.title_ru:p.title_en;
    lb.classList.add('open'); document.body.style.overflow='hidden';
  }
  function closeLB(){ lb.classList.remove('open'); document.body.style.overflow=''; }
  document.getElementById('lb-close').addEventListener('click',closeLB);
  lb.addEventListener('click',function(e){if(e.target===lb)closeLB();});
  document.getElementById('lb-prev').addEventListener('click',function(e){e.stopPropagation();lbIdx=(lbIdx-1+S.photos.length)%S.photos.length;openLB(lbIdx);});
  document.getElementById('lb-next').addEventListener('click',function(e){e.stopPropagation();lbIdx=(lbIdx+1)%S.photos.length;openLB(lbIdx);});

  /* ── VIDEO MODAL ────────────────────────── */
  var vm=document.getElementById('vm'), vif=document.getElementById('v-ifr');
  function openVid(id,isK){
    vif.src=isK?'https://kinescope.io/embed/'+id+'?autoplay=1':'https://www.youtube.com/embed/'+id+'?autoplay=1';
    vm.classList.add('open'); document.body.style.overflow='hidden';
  }
  function closeVid(){ vm.classList.remove('open'); vif.src=''; document.body.style.overflow=''; }
  document.getElementById('vm-close').addEventListener('click',closeVid);
  vm.addEventListener('click',function(e){if(e.target===vm)closeVid();});

  /* ── KEYBOARD ───────────────────────────── */
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){closeLB();closeVid();}
    if(lb.classList.contains('open')){
      if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+S.photos.length)%S.photos.length;openLB(lbIdx);}
      if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%S.photos.length;openLB(lbIdx);}
    }
  });

  /* ── CURSOR ─────────────────────────────── */
  var cur=document.getElementById('cur'), dot=document.getElementById('cur-dot');
  if(cur){
    document.addEventListener('mousemove',function(e){
      cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
      dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
    });
    document.querySelectorAll('a,button,.gallery-item,.video-card').forEach(function(el){
      el.addEventListener('mouseenter',function(){cur.classList.add('cur-lg');});
      el.addEventListener('mouseleave',function(){cur.classList.remove('cur-lg');});
    });
  }

  /* ── SCROLL REVEAL ──────────────────────── */
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});
  },{threshold:0.07});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});

  /* ── GALLERY STAGGER ────────────────────── */
  function initGalleryObserver(){
    var gio=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          var i=parseInt(e.target.dataset.index)||0;
          setTimeout(function(){e.target.style.opacity='1';e.target.style.transform='none';},i*50);
          gio.unobserve(e.target);
        }
      });
    },{threshold:0.04});
    document.querySelectorAll('.gallery-item').forEach(function(el){gio.observe(el);});
  }

  /* ── MOBILE MENU ────────────────────────── */
  document.getElementById('nav-burger').addEventListener('click',function(){
    document.getElementById('nav-links').classList.toggle('open');
  });
  document.querySelectorAll('.nav-links a').forEach(function(a){
    a.addEventListener('click',function(){document.getElementById('nav-links').classList.remove('open');});
  });

})();
</script>
</body>
</html>
